<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Gui-Eli-Fer | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Noto Sans', sans-serif; background-color: #150808; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .form-input-custom { background: #000; border: 1px solid #333; color: #fff; text-align: right; font-weight: bold; }
        .form-input-custom:focus { border-color: #f20d0d; ring: 1px solid #f20d0d; outline: none; }
        #auth-overlay { background: #150808; z-index: 9999; }
    </style>
    <!-- PWA Basic Tags -->
    <meta name="theme-color" content="#150808">
    <link rel="manifest" href="manifest.json">
</head>
<body class="text-slate-100 pb-32">
    <!-- Header -->
    <header class="p-6 border-b border-white/10 flex items-center justify-between sticky top-0 bg-[#150808]/90 backdrop-blur-md z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-white">settings_account_box</span>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight uppercase tracking-tighter">Admin Boutique</h1>
                <p class="text-[10px] text-primary font-bold uppercase tracking-widest">Gestionar Precios</p>
            </div>
        </div>
        <button class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-slate-400">
            <span class="material-symbols-outlined">logout</span>
        </button>
    </header>

    <!-- Auth Overlay (PIN) -->
    <div id="auth-overlay" class="fixed inset-0 flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-8">
            <div class="w-20 h-20 bg-primary/20 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-primary/30">
                <span class="material-symbols-outlined text-4xl text-primary">lock</span>
            </div>
            <h2 class="text-2xl font-bold mb-2 font-display">Acceso Restringido</h2>
            <p class="text-slate-500 text-sm">Ingrese el PIN de administración</p>
        </div>
        <div class="flex gap-4 mb-8">
            <input type="password" id="admin-pin" class="bg-white/5 border-white/10 rounded-xl text-center text-3xl font-bold w-48 py-4 focus:ring-primary focus:border-primary" placeholder="••••" maxlength="4">
        </div>
        <button onclick="checkPin()" class="w-full max-w-[200px] py-4 bg-primary text-white rounded-xl font-bold active:scale-95 transition-all">ACCEDER</button>
        <p id="pin-error" class="text-primary text-xs mt-4 font-bold hidden uppercase tracking-widest">PIN INCORRECTO</p>
    </div>

    <main id="admin-main" class="p-6 space-y-8 max-w-lg mx-auto hidden opacity-0 transition-opacity duration-500">
        <!-- Resumen Rápido -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-4 rounded-2xl">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Cortes Totales</p>
                <p id="stat-total" class="text-2xl font-bold">--</p>
            </div>
            <div class="glass p-4 rounded-2xl">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Estado API</p>
                <p id="stat-api" class="text-xs font-bold text-slate-400">Offline (Mock)</p>
            </div>
        </div>

        <!-- Lista de Productos -->
        <div class="space-y-4">
            <div class="flex items-center justify-between px-1">
                <h2 class="text-xs uppercase tracking-[0.3em] font-bold text-slate-500">Catálogo de Cortes</h2>
                <span class="text-[8px] bg-white/10 px-2 py-1 rounded text-slate-400 font-bold uppercase">Cargando...</span>
            </div>
            
            <div id="products-list" class="space-y-4">
                <!-- Se cargará aquí -->
            </div>

            <p class="text-center py-6 text-[10px] text-slate-600 uppercase tracking-widest">Fin del catálogo</p>
        </div>
    </main>

    <!-- Footer Action Bar -->
    <div id="action-bar" class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-[#150808] via-[#150808] to-transparent z-50 hidden">
        <button onclick="publishChanges()" id="publish-btn" class="w-full bg-primary hover:bg-red-700 text-white py-5 rounded-2xl font-bold shadow-2xl shadow-primary/40 flex items-center justify-center gap-3 active:scale-95 transition-all disabled:opacity-50 disabled:grayscale">
            <span class="material-symbols-outlined">publish</span>
            PUBLICAR CAMBIOS (ONLINE)
        </button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[9999] glass px-6 py-3 rounded-full border-primary/50 text-white text-sm font-bold shadow-2xl opacity-0 translate-y-[-20px] transition-all">
        ¡Cambios guardados con éxito!
    </div>

    <script>
        const SHEET_API_URL = ""; // Tu URL de Sheetbest/Sheety aquí
        let products = [];
        const ADMIN_PIN = "3532"; // PIN por defecto (CUIL del titular)

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.borderColor = isError ? 'rgba(242, 13, 13, 0.5)' : 'rgba(34, 197, 94, 0.5)';
            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        function checkPin() {
            const input = document.getElementById('admin-pin');
            if (input.value === ADMIN_PIN) {
                document.getElementById('auth-overlay').classList.add('hidden');
                const main = document.getElementById('admin-main');
                main.classList.remove('hidden');
                setTimeout(() => main.classList.add('opacity-100'), 50);
                document.getElementById('action-bar').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
                input.value = "";
                input.focus();
            }
        }

        async function loadData() {
            try {
                const response = await fetch('productos.json');
                products = await response.json();
                renderList();
                document.getElementById('stat-total').innerText = products.length;
                if (SHEET_API_URL) {
                    document.getElementById('stat-api').innerText = "Online (Sheets)";
                    document.getElementById('stat-api').classList.replace('text-slate-400', 'text-green-500');
                }
            } catch (error) {
                showToast("Error cargando productos localmente", true);
            }
        }

        function renderList() {
            const container = document.getElementById('products-list');
            container.innerHTML = products.map((p, index) => `
                <div class="glass rounded-2xl p-4 flex items-center gap-4">
                    <img src="${p.img}" class="w-16 h-16 rounded-xl object-cover" alt="${p.name}">
                    <div class="flex-1">
                        <h3 class="font-bold text-sm text-slate-100">${p.name}</h3>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest">${p.category}</p>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div class="flex items-center gap-1">
                            <span class="text-[10px] text-slate-400 font-bold">ARS $</span>
                            <input type="number" onchange="updatePrice(${index}, this.value)" value="${p.price}" class="form-input-custom w-24 p-2 rounded-lg text-sm">
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" onchange="updateStock(${index}, this.checked)" ${p.stock !== false ? 'checked' : ''} class="sr-only peer">
                            <div class="w-9 h-5 bg-white/10 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-slate-400 after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                            <span class="ml-2 text-[10px] font-bold text-slate-400 uppercase peer-checked:text-primary">Stock</span>
                        </label>
                    </div>
                </div>
            `).join('');
        }

        function updatePrice(index, val) {
            products[index].price = parseFloat(val);
        }

        function updateStock(index, val) {
            products[index].stock = val;
        }

        async function publishChanges() {
            const btn = document.getElementById('publish-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> PUBLICANDO...`;

            try {
                if (SHEET_API_URL) {
                    // Aquí iría el envío real a Google Sheets (Sheetbest permite enviar todo el array o filas seleccionadas)
                    const response = await fetch(SHEET_API_URL, {
                        method: 'PUT', // O PATCH dependiendo de la configuración
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(products)
                    });
                    if (!response.ok) throw new Error();
                    showToast("¡Precios actualizados en la web!");
                } else {
                    // Simulacro para Desarrollo
                    console.log("Cambios simulados (Sin URL de API):", products);
                    await new Promise(r => setTimeout(r, 1500));
                    showToast("Simulacro completo. ¡Listo para conectar!");
                }
            } catch (error) {
                showToast("Error al publicar. Verifique conexión.", true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
